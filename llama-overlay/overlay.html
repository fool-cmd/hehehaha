<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .overlay-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            display: inline-block;
            background: #181818;
            padding: 4px 10px;
            color: #8ab4f8;
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            border-top-right-radius: 3px;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #888;
        }

        .spinner {
            width: 10px;
            height: 10px;
            border: 1.5px solid #666;
            border-top-color: #8ab4f8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .url-text {
            color: #606060;
            white-space: nowrap;
        }

        .counter {
            color: #666;
            font-size: 9px;
            margin-left: 8px;
        }

        .error {
            color: #f66;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="overlay-bar" id="overlay">
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>...</span>
        </div>
        <span id="answer" class="url-text"></span>
        <span id="counter" class="counter"></span>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let settings = {
            apiKey: '',
            apiUrl: 'http://localhost:11434/v1/chat/completions',
            model: 'llama3'
        };
        let answerLines = [];
        let currentIndex = 0;
        let lastQuestion = '';
        let lastDetectedType = 'mcq';

        const overlay = document.getElementById('overlay');
        const loadingEl = document.getElementById('loading');
        const answerEl = document.getElementById('answer');
        const counterEl = document.getElementById('counter');

        function detectQuestionType(text) {
            const lower = text.toLowerCase();
            const codeKeywords = ['write a program', 'write a code', 'write code', 'write a function',
                'write a class', 'write a method', 'write a script', 'implement a',
                'create a program', 'create a class', 'create a function', 'define a class',
                'define a function', 'wap ', 'w.a.p', 'write a python', 'coding question',
                'write the code', 'write python code', 'develop a', 'design a class',
                'design an abstract', 'abstract class', 'implement subclass', 'create a subclass',
                'create subclass', 'abstract method', 'concrete method', 'implement the',
                'template method pattern', 'observer pattern', 'factory pattern',
                'strategy pattern', 'singleton pattern', 'design pattern',
                'private field', 'calculatearea', 'calculatediscount', 'calculatefare',
                'calculatescholarship', 'displayproduct', 'displayvehicle', 'displaystudent',
                'use the template', 'use the observer', 'use the factory', 'use the strategy'];
            const mcqKeywords = ['a)', 'b)', 'c)', 'd)', 'a.', 'b.', 'c.', 'd.',
                '(a)', '(b)', '(c)', '(d)', 'option a', 'option b', 'option c', 'option d'];
            const shortKeywords = ['write short note', 'short note', 'explain', 'describe',
                'what is', 'what are', 'define ', 'differentiate', 'difference between',
                'compare', 'list the', 'enumerate', 'discuss', 'elaborate', 'advantages',
                'disadvantages', 'features of', 'characteristics', 'purpose of',
                'importance of', 'types of', 'principles of', 'role of', 'significance',
                'how does', 'why is', 'when to use', 'benefits of'];

            for (let kw of codeKeywords) {
                if (lower.includes(kw)) return 'code';
            }
            let mcqCount = 0;
            for (let kw of mcqKeywords) {
                if (lower.includes(kw)) mcqCount++;
            }
            if (mcqCount >= 2) return 'mcq';
            for (let kw of shortKeywords) {
                if (lower.includes(kw)) return 'short';
            }
            if (mcqCount >= 1) return 'mcq';
            return 'short';
        }

        function formatShortAnswer(text) {
            if (!text) return [];
            const prefix = 'https://c4mpus.test.com/ ';
            const lines = [];
            const paragraphs = text.split(/\n+/);
            let lineNum = 1;

            paragraphs.forEach((para, pIndex) => {
                if (!para.trim()) return;
                const words = para.trim().split(/\s+/);
                for (let i = 0; i < words.length; i += 7) {
                    const chunk = words.slice(i, i + 7).join(' ');
                    lines.push(prefix + 'L' + lineNum + ' ' + chunk);
                    lineNum++;
                }
                if (pIndex < paragraphs.length - 1) {
                    lines.push(prefix);
                }
            });
            return lines;
        }

        function formatCodeAnswer(text) {
            if (!text) return [];
            const prefix = 'https://c4mpus.test.com/ ';
            const lines = [];

            let cleaned = text.replace(/```python\s*/gi, '').replace(/```\s*/g, '').trim();

            const codeLines = cleaned.split('\n');
            let lineNum = 1;

            codeLines.forEach(line => {
                let trimmed = line.trimEnd();
                if (trimmed === '') {
                    lines.push(prefix);
                    return;
                }
                lines.push(prefix + 'L' + lineNum + ' ' + trimmed);
                lineNum++;
            });
            return lines;
        }

        function formatMcqAnswer(text) {
            if (!text) return [];
            const prefix = 'https://c4mpus.test.com/ ';
            const lines = [];
            const paragraphs = text.split(/\n+/);

            paragraphs.forEach((para, pIndex) => {
                if (!para.trim()) return;
                const words = para.trim().split(/\s+/);
                for (let i = 0; i < words.length; i += 7) {
                    const chunk = words.slice(i, i + 7).join(' ');
                    lines.push(prefix + chunk);
                }
                if (pIndex < paragraphs.length - 1) {
                    lines.push(prefix);
                }
            });
            return lines;
        }

        ipcRenderer.on('update-settings', (event, newSettings) => {
            settings = { ...settings, ...newSettings };
        });

        ipcRenderer.on('get-answer', async (event, clipboardText) => {
            if (!settings.apiUrl) {
                answerEl.textContent = 'https://c4mpus.test.com/error/configure_settings_first';
                ipcRenderer.send('show-overlay');
                return;
            }

            if (!clipboardText || clipboardText.trim().length < 3) {
                answerEl.textContent = 'https://c4mpus.test.com/clipboard/empty';
                ipcRenderer.send('show-overlay');
                return;
            }

            loadingEl.classList.remove('hidden');
            answerEl.textContent = '';
            counterEl.textContent = '';
            ipcRenderer.send('show-overlay');

            try {
                lastQuestion = clipboardText;
                lastDetectedType = detectQuestionType(clipboardText);

                const targetModel = settings.model;
                const headers = { 'Content-Type': 'application/json' };
                if (settings.apiKey) {
                    headers['Authorization'] = `Bearer ${settings.apiKey}`;
                }

                let systemPrompt = '';

                if (lastDetectedType === 'mcq') {
                    systemPrompt = `You are a programming expert specializing in Python OOP, Java OOP, design patterns, and software engineering. You solve MCQ questions perfectly. Your knowledge covers classes, objects, inheritance (single, multiple, multilevel, hierarchical), polymorphism, encapsulation, abstraction, abstract classes, interfaces, dunder methods, decorators, MRO, super(), access modifiers, ABC, metaclasses, descriptors, mixins, SOLID principles, and design patterns (Singleton, Factory, Observer, Strategy, Template Method, Adapter, Decorator, Command, State, Builder). RULES: 1. First line: ONLY the correct option letter like A or B or C or D. 2. Second line: brief 1-2 sentence explanation why. 3. No filler, no intro, no "The answer is". Just letter then reason.`;
                } else if (lastDetectedType === 'code') {
                    systemPrompt = `You are a Python programmer writing code for a university exam. You write code exactly like a real student would write by hand. STRICT RULES: 1. Give ONLY the Python code. No explanation before or after the code. No "Here is the code" or "Output" section. 2. ZERO comments anywhere. No inline comments, no block comments, no docstrings, no # lines. A student writing fast in an exam does not write comments. 3. Use simple natural variable names like name, price, num, dist, gpa, fare, discount, result, obj, s1, s2, e1, t1 etc. 4. Keep code clean and correct but in a human student style. Not overly clever. 5. No type hints. No annotations. 6. Use simple string concat with + or .format() instead of f-strings. 7. Use print() to show output where the question asks to demonstrate. 8. If the question says "private field" use Python name mangling with double underscore __fieldName and provide a getter method. 9. If the question says "constructor" use __init__. 10. If the question says "abstract class" use from abc import ABC, abstractmethod. 11. If the question says "concrete method" make it a normal method in the abstract class. 12. If the question mentions design patterns like Template Method, Observer, Factory, Strategy etc implement them properly in Python. 13. For Observer pattern use a simple list of listeners and a notify method. 14. For Template Method pattern use an abstract base class with a template method that calls abstract steps. 15. After defining classes, add 2-3 lines at the bottom that create objects and call methods to show it works. 16. Start the code directly. No markdown. No backticks. Just plain Python code.`;
                } else {
                    systemPrompt = `You are a programming expert answering university exam questions. Write short concise answers like a good student writing in an exam. Your knowledge covers Python OOP, Java OOP, design patterns (Singleton, Factory, Observer, Strategy, Template Method, Adapter, Decorator), SOLID principles, abstract classes, interfaces, inheritance, polymorphism, encapsulation, abstraction, and software engineering concepts. RULES: 1. Answer directly. No intro like "Sure" or "Here is". 2. Keep it brief and to the point. 3. Use simple clear language a student would write. 4. If asked for a definition give it in 2-3 sentences max. 5. If asked to explain use short paragraphs. 6. If listing points use numbered points, keep each to one line. 7. Do not use markdown formatting. No bold, no bullets with *, no headers with #. Just plain text. 8. If a question could need a small code example keep it very short, 3-5 lines max inline.`;
                }

                const response = await fetch(settings.apiUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        model: targetModel,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: clipboardText }
                        ]
                    })
                });

                loadingEl.classList.add('hidden');

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`${response.status}/${errText.slice(0, 50)}`);
                }

                const data = await response.json();
                const text = data.choices[0].message.content;

                const fs = require('fs');
                const path = require('path');
                const desktopPath = path.join(require('os').homedir(), 'Desktop', 'cs_answer.txt');
                const fileContent = `TYPE: ${lastDetectedType.toUpperCase()}\nQUESTION:\n${clipboardText}\n\nANSWER:\n${text}`;
                fs.writeFileSync(desktopPath, fileContent, 'utf8');

                if (lastDetectedType === 'code') {
                    answerLines = formatCodeAnswer(text);
                } else if (lastDetectedType === 'short') {
                    answerLines = formatShortAnswer(text);
                } else {
                    answerLines = formatMcqAnswer(text);
                }
                currentIndex = 0;

                if (answerLines.length > 0) {
                    answerEl.textContent = answerLines[0];
                    counterEl.textContent = `[${currentIndex + 1}/${answerLines.length}]`;
                }

            } catch (error) {
                loadingEl.classList.add('hidden');
                let safeMsg = error.message
                    .replace(/["{}]/g, '')
                    .replace(/\s+/g, '/')
                    .replace(/error/gi, '')
                    .slice(0, 60);
                answerEl.textContent = `https://c4mpus.test.com/error/${safeMsg}`;
            }
        });

        ipcRenderer.on('next-line', () => {
            if (currentIndex < answerLines.length - 1) {
                currentIndex++;
                answerEl.textContent = answerLines[currentIndex];
                counterEl.textContent = `[${currentIndex + 1}/${answerLines.length}]`;
                ipcRenderer.send('show-overlay');
            }
        });

        ipcRenderer.on('prev-line', () => {
            if (currentIndex > 0) {
                currentIndex--;
                answerEl.textContent = answerLines[currentIndex];
                counterEl.textContent = `[${currentIndex + 1}/${answerLines.length}]`;
            }
        });

        ipcRenderer.on('reset', () => {
            answerLines = [];
            currentIndex = 0;
            answerEl.textContent = '';
            counterEl.textContent = '';
            loadingEl.classList.add('hidden');
        });

        ipcRenderer.on('re-query', () => {
            if (lastQuestion) {
                answerLines = [];
                currentIndex = 0;
                answerEl.textContent = '';
                counterEl.textContent = '';
                ipcRenderer.emit('get-answer', null, lastQuestion);
            }
        });
    </script>
</body>

</html>
